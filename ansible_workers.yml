- name: Thinman workers
  hosts: thinman_workers
  become: yes

  vars:
    # Path on your control machine to repo root
    code_src: "/home/jerry/apps/thinvids"

    # Runtime user/paths on workers
    thinman_user: jerry
    thinman_group: jerry
    app_root: /opt/jerry
    projects_dir: /projects
    watch_dir: /watch
    library_dir: /library
    source_media_dir: /source_media
    nfs_project_root: /library/.thinvids-projects

    # Redis / pipeline
    redis_host: swarm1
    redis_port: 6379
    redis_db_tasks: 0
    redis_db_data: 1
    huey_name: thinvids_tasks
    huey_pipeline_name: "{{ huey_name }}:pipeline"
    huey_encode_name: "{{ huey_name }}:encode"
    ttl_sec: 15
    master_http_port: 8000
    vaapi_device: /dev/dri/renderD128
    huey_workers: 1
    manager_reboot_ssh_key_path: "/home/{{ thinman_user }}/.ssh/id_ed25519"

    # OS packages
    base_packages:
      - python3
      - python3-venv
      - python3-pip
      - python3-psutil
      - python3-redis
      - rsync
      - ffmpeg
      - vainfo
      - intel-media-va-driver
      - intel-gpu-tools
      - nfs-common
      - ethtool
      - fonts-dejavu-core

    # Python packages (in venv)
    pip_packages: [huey, redis, requests]

    # NFS settings (mirror your compose config)
    nfs_server: 192.168.0.5
    nfs_fstype: nfs
    nfs_opts: "nolock,soft,_netdev"
    nfs_watch_export:   /volume1/shared/projects/media/archive
    nfs_library_export: /volume1/shared/projects/media/library
    source_media_server: swarm2
    source_media_export: /home/jerry/media/data/media
    source_media_fstype: nfs4
    source_media_opts: "ro,soft,timeo=5,retrans=1,_netdev,nofail"

    # Optional centralized journald upload
    enable_journal_upload: false
    journal_aggregator_url: "http://swarm1:19532"

  tasks:
    # --- Packages & user ---
    - name: Ensure packages
      ansible.builtin.package:
        name: "{{ base_packages }}"
        state: present

    - name: Ensure thinman group
      ansible.builtin.group:
        name: "{{ thinman_group }}"
        state: present

    # ensure groups exist
    - name: Ensure render group
      ansible.builtin.group:
        name: render
        state: present

    - name: Ensure thinman user (in video+render groups)
      ansible.builtin.user:
        name: "{{ thinman_user }}"
        groups: "{{ thinman_group }},video,render"
        append: yes
        shell: /bin/bash
        create_home: yes

    - name: Ensure manager SSH directory exists
      ansible.builtin.file:
        path: "/home/{{ thinman_user }}/.ssh"
        state: directory
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0700"
      delegate_to: "{{ groups['thinman_managers'][0] }}"
      run_once: true

    - name: Check manager reboot SSH key
      ansible.builtin.stat:
        path: "{{ manager_reboot_ssh_key_path }}"
      delegate_to: "{{ groups['thinman_managers'][0] }}"
      register: manager_reboot_ssh_key
      run_once: true

    - name: Create manager reboot SSH key
      ansible.builtin.command:
        cmd: "ssh-keygen -t ed25519 -f {{ manager_reboot_ssh_key_path }} -N '' -C thinvids-manager-reboot"
        creates: "{{ manager_reboot_ssh_key_path }}"
      become_user: "{{ thinman_user }}"
      delegate_to: "{{ groups['thinman_managers'][0] }}"
      run_once: true
      when: not manager_reboot_ssh_key.stat.exists

    - name: Read manager reboot SSH public key
      ansible.builtin.slurp:
        src: "{{ manager_reboot_ssh_key_path }}.pub"
      delegate_to: "{{ groups['thinman_managers'][0] }}"
      register: manager_reboot_ssh_public_key
      run_once: true

    - name: Allow manager SSH key to log in to workers
      ansible.posix.authorized_key:
        user: "{{ thinman_user }}"
        key: "{{ manager_reboot_ssh_public_key.content | b64decode }}"
        state: present
        comment: thinvids-manager-reboot

    - name: Allow manager-triggered worker reboot
      ansible.builtin.copy:
        dest: /etc/sudoers.d/thinvids-worker-reboot
        owner: root
        group: root
        mode: "0440"
        content: |
          {{ thinman_user }} ALL=(root) NOPASSWD: /bin/systemctl reboot, /usr/bin/systemctl reboot
        validate: "visudo -cf %s"

    # --- Directories (mountpoints + app dir) ---
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_root }}/current"
        state: directory
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0755"

    - name: Ensure NFS mountpoints exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ watch_dir }}"
        - "{{ library_dir }}"

    - name: Ensure local scratch root exists
      ansible.builtin.file:
        path: "{{ projects_dir }}"
        state: directory
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0775"

    - name: Ensure /source_media mountpoint exists
      ansible.builtin.file:
        path: "{{ source_media_dir }}"
        state: directory

    # --- NFS mounts (idempotent, adds to fstab & mounts now) ---
    - name: Mount /watch (NFS)
      ansible.builtin.mount:
        path: "{{ watch_dir }}"
        src: "{{ nfs_server }}:{{ nfs_watch_export }}"
        fstype: "{{ nfs_fstype }}"
        opts: "{{ nfs_opts }}"
        state: mounted

    - name: Mount /library (NFS)
      ansible.builtin.mount:
        path: "{{ library_dir }}"
        src: "{{ nfs_server }}:{{ nfs_library_export }}"
        fstype: "{{ nfs_fstype }}"
        opts: "{{ nfs_opts }}"
        state: mounted

    - name: Mount /source_media (swarm2 read-only NFS)
      ansible.builtin.mount:
        path: "{{ source_media_dir }}"
        src: "{{ source_media_server }}:{{ source_media_export }}"
        fstype: "{{ source_media_fstype }}"
        opts: "{{ source_media_opts }}"
        state: mounted

    - name: Ensure NFS project scratch root exists
      ansible.builtin.file:
        path: "{{ nfs_project_root }}"
        state: directory
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0775"

    # --- venv for worker ---
    - name: Create venv
      command: python3 -m venv {{ app_root }}/venv
      args:
        creates: "{{ app_root }}/venv/bin/python"

    - name: Upgrade pip
      command: "{{ app_root }}/venv/bin/pip install --upgrade pip"
      changed_when: false

    - name: Install Python deps in venv
      ansible.builtin.pip:
        name: "{{ pip_packages }}"
        virtualenv: "{{ app_root }}/venv"

    # --- Deploy only what workers need: worker/ + agent.py ---
    - name: Sync worker code
      ansible.builtin.copy:
        src: "{{ code_src }}/worker/"
        dest: "{{ app_root }}/current/"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: preserve
      notify:
        - restart thinman-worker-encode
        - restart thinman-worker-pipeline
      tags: build_app # Add a tag here

    - name: Purge old bytecode (avoid stale imports)
      command: find {{ app_root }}/current -name __pycache__ -type d -prune -exec rm -rf {} +
      changed_when: false
      tags: build_app # Add a tag here

    - name: Install agent.py
      ansible.builtin.copy:
        src: "{{ code_src }}/agent/agent.py"
        dest: "{{ app_root }}/current/agent.py"
        owner: root
        group: root
        mode: "0755"
      notify: restart thinman-agent
      tags: build_app # Add a tag here

    - name: Install common.py
      ansible.builtin.copy:
        src: "{{ code_src }}/common.py"
        dest: "{{ app_root }}/current/common.py"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0644"
      notify: 
        - restart thinman-worker-encode
        - restart thinman-worker-pipeline
        - restart thinman-agent
      tags: build_app # Add a tag here

    - name: thinman-agent.service (root using worker venv)
      ansible.builtin.copy:
        dest: /etc/systemd/system/thinman-agent.service
        mode: "0644"
        content: |
          [Unit]
          Description=Thinman Agent
          After=network-online.target remote-fs.target
          Wants=network-online.target remote-fs.target

          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory={{ app_root }}/current
          Restart=always
          RestartSec=2
          SyslogIdentifier=thinman-agent

          # So agent/common.py in {{ app_root }}/current is importable
          Environment=PYTHONPATH={{ app_root }}/current:{{ app_root }}/current

          # App settings
          Environment=REDIS_HOST={{ redis_host }}
          Environment=REDIS_PORT={{ redis_port }}
          Environment=REDIS_DB={{ redis_db_data }}
          Environment=TTL_SEC={{ ttl_sec }}
          Environment=NODE_NAME=%H
          Environment=GC_BASE_DIR={{ projects_dir }}
          Environment=GC_INTERVAL_SEC=900
          Environment=GC_MIN_AGE_SEC=21600

          # Use the SAME venv as the worker
          ExecStart={{ app_root }}/venv/bin/python agent.py

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart thinman-agent

    - name: Disable legacy single-queue worker
      ansible.builtin.systemd:
        name: thinman-worker
        enabled: false
        state: stopped
      failed_when: false

    - name: Remove legacy single-queue worker unit
      ansible.builtin.file:
        path: /etc/systemd/system/thinman-worker.service
        state: absent
      notify:
        - systemd daemon-reload

    - name: thinman-worker-encode.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/thinman-worker-encode.service
        mode: "0644"
        content: |
          [Unit]
          Description=Thinman Encode Worker (Huey)
          After=network-online.target remote-fs.target
          Wants=network-online.target remote-fs.target
          RequiresMountsFor={{ watch_dir }} {{ library_dir }} {{ source_media_dir }}

          [Service]
          Type=simple
          User={{ thinman_user }}
          Group={{ thinman_group }}
          SupplementaryGroups=video render
          WorkingDirectory={{ app_root }}/current
          Environment=PYTHONPATH={{ app_root }}/current:{{ app_root }}/current
          Environment=REDIS_HOST={{ redis_host }}
          Environment=REDIS_PORT={{ redis_port }}
          Environment=REDIS_DB_TASKS={{ redis_db_tasks }}
          Environment=REDIS_DB_DATA={{ redis_db_data }}
          Environment=HUEY_NAME={{ huey_name }}
          Environment=HUEY_PIPELINE_NAME={{ huey_pipeline_name }}
          Environment=HUEY_ENCODE_NAME={{ huey_encode_name }}
          Environment=PROJECT_ROOT={{ projects_dir }}
          Environment=WATCH_ROOT={{ watch_dir }}
          Environment=SOURCE_MEDIA_ROOT={{ source_media_dir }}
          Environment=LIBRARY_ROOT={{ library_dir }}
          Environment=NFS_PROJECT_ROOT={{ nfs_project_root }}
          Environment=MASTER_HTTP_PORT={{ master_http_port }}
          Environment=VAAPI_DEVICE={{ vaapi_device }}
          Environment=PART_FAILURE_MAX_RETRIES=5
          ExecStart={{ app_root }}/venv/bin/huey_consumer tasks.encode_huey -k thread -w {{ huey_workers }} --flush-locks
          Restart=always
          RestartPreventExitStatus=75
          RestartSec=2
          SyslogIdentifier=thinman-worker-encode

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart thinman-worker-encode

    - name: thinman-worker-pipeline.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/thinman-worker-pipeline.service
        mode: "0644"
        content: |
          [Unit]
          Description=Thinman Pipeline Worker (Huey)
          After=network-online.target remote-fs.target
          Wants=network-online.target remote-fs.target
          RequiresMountsFor={{ watch_dir }} {{ library_dir }} {{ source_media_dir }}

          [Service]
          Type=simple
          User={{ thinman_user }}
          Group={{ thinman_group }}
          SupplementaryGroups=video render
          WorkingDirectory={{ app_root }}/current
          Environment=PYTHONPATH={{ app_root }}/current:{{ app_root }}/current
          Environment=REDIS_HOST={{ redis_host }}
          Environment=REDIS_PORT={{ redis_port }}
          Environment=REDIS_DB_TASKS={{ redis_db_tasks }}
          Environment=REDIS_DB_DATA={{ redis_db_data }}
          Environment=HUEY_NAME={{ huey_name }}
          Environment=HUEY_PIPELINE_NAME={{ huey_pipeline_name }}
          Environment=HUEY_ENCODE_NAME={{ huey_encode_name }}
          Environment=PROJECT_ROOT={{ projects_dir }}
          Environment=WATCH_ROOT={{ watch_dir }}
          Environment=SOURCE_MEDIA_ROOT={{ source_media_dir }}
          Environment=LIBRARY_ROOT={{ library_dir }}
          Environment=NFS_PROJECT_ROOT={{ nfs_project_root }}
          Environment=MASTER_HTTP_PORT={{ master_http_port }}
          Environment=VAAPI_DEVICE={{ vaapi_device }}
          Environment=PART_FAILURE_MAX_RETRIES=5
          ExecStart={{ app_root }}/venv/bin/huey_consumer tasks.pipeline_huey -k thread -w {{ huey_workers }} --flush-locks
          Restart=always
          RestartPreventExitStatus=75
          RestartSec=2
          SyslogIdentifier=thinman-worker-pipeline

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart thinman-worker-pipeline

    - name: Reload systemd (ensure units visible before first start)
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable & start agent
      ansible.builtin.systemd:
        name: thinman-agent
        enabled: true
        state: started

    - name: Enable & start encode worker
      ansible.builtin.systemd:
        name: thinman-worker-encode
        enabled: true
        state: started

    - name: Keep pipeline worker agent-controlled
      ansible.builtin.systemd:
        name: thinman-worker-pipeline
        enabled: false
        state: stopped

    # --- Centralized journald upload (optional) ---
    - name: Install systemd-journal-upload
      when: enable_journal_upload | bool
      ansible.builtin.package:
        name: systemd-journal-upload
        state: present

    - name: Configure journal-upload
      when: enable_journal_upload | bool
      ansible.builtin.copy:
        dest: /etc/systemd/journal-upload.conf
        mode: "0644"
        content: |
          [Upload]
          URL={{ journal_aggregator_url }}
          ServerKeyFile=
          ServerCertificateFile=
          TrustedCertificateFile=

    - name: Enable & start journal-upload
      when: enable_journal_upload | bool
      ansible.builtin.systemd:
        name: systemd-journal-upload
        enabled: true
        state: started

    - name: Install /etc/network/interfaces
      ansible.builtin.copy:
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: "0644"
        content: |
          source /etc/network/interfaces.d/*

          # The loopback network interface
          auto lo
          iface lo inet loopback

          # The primary network interface
          allow-hotplug enp1s0
          iface enp1s0 inet dhcp
          ethernet-wol g
      notify: restart networking

    # Remove any legacy copy in /etc to avoid double execution
    - name: Remove legacy resume hook from /etc
      ansible.builtin.file:
        path: /etc/systemd/system-sleep/thinman-resume
        state: absent

    # Install the hook in /lib (primary location many distros scan)
    - name: Install thinman resume hook (primary in /lib)
      ansible.builtin.copy:
        dest: /lib/systemd/system-sleep/thinman-resume
        mode: "0755"
        owner: root
        group: root
        content: |
          #!/bin/sh
          # Called as: {pre|post} {suspend|hibernate|hybrid-sleep|suspend-then-hibernate}
          LOGGER=/usr/bin/logger
          SYSTEMCTL=/usr/bin/systemctl
          SLEEP=/bin/sleep
          TAG="thinman-resume"
          case "$1" in
            post)
              "$LOGGER" -t "$TAG" "Resume detected (mode=$2): reloading systemd and restarting thinman services"
              "$SLEEP" 3
              "$SYSTEMCTL" daemon-reload
              "$SYSTEMCTL" restart thinman-agent.service  || true
              "$SYSTEMCTL" restart thinman-worker-encode.service || true
              "$LOGGER" -t "$TAG" "Resume recovery complete"
              ;;
          esac

    - name: Remove agent capability drop-in (no longer needed as root)
      ansible.builtin.file:
        path: /etc/systemd/system/thinman-agent.service.d/capabilities.conf
        state: absent

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
        
  handlers:
    - name: systemd daemon-reload
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: restart thinman-agent
      ansible.builtin.systemd:
        name: thinman-agent
        state: restarted

    - name: restart thinman-worker-encode
      ansible.builtin.systemd:
        name: thinman-worker-encode
        state: restarted

    - name: restart thinman-worker-pipeline
      ansible.builtin.command: systemctl try-restart thinman-worker-pipeline.service
      changed_when: false

    - name: restart networking
      ansible.builtin.service:
        name: networking
        state: restarted
