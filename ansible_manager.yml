- name: Thinvids manager
  hosts: thinman_managers
  become: yes

  vars:
    # Path on your control machine to repo root
    code_src: "/home/jerry/apps/thinvids"

    # Runtime user/paths (match workers layout)
    thinman_user: jerry
    thinman_group: jerry
    app_root: /opt/jerry
    projects_dir: /projects
    watch_dir: /watch
    library_dir: /library
    config_dir: /config
    source_media_dir: /source_media
    nfs_project_root: /library/.thinvids-projects

    # Redis (manager uses same Redis as workers)
    redis_host: swarm1
    redis_port: 6379
    redis_db_tasks: 0
    redis_db_data: 1
    huey_name: thinvids_tasks
    master_http_port: 8000
    pipeline_max_active_jobs: 2
    pipeline_drain_ratio_to_start_next: "0.75"
    pipeline_min_idle_workers_to_start_next: 4

    # Manager HTTP port
    manager_http_port: 5005

    # OS packages (mirrors worker set; manager doesn't *need* ffmpeg/vaapi, harmless to keep consistent)
    base_packages:
      - python3
      - python3-venv
      - python3-pip
      - python3-psutil
      - python3-redis
      - rsync
      - ffmpeg
      - nfs-common
      - sudo

    # Python packages (in venv)
    pip_packages: [flask, huey, redis, psutil, humanize, gunicorn, requests, watchdog]

    # NFS settings (mirror compose)
    nfs_server: 192.168.0.5
    nfs_fstype: nfs
    nfs_opts: "nolock,soft,_netdev"
    nfs_watch_export:   /volume1/shared/projects/media/archive
    nfs_library_export: /volume1/shared/projects/media/library
    nfs_config_export:   /volume1/shared/projects/transcoder/config
    source_media_server: swarm2
    source_media_export: /home/jerry/media/data/media
    source_media_fstype: nfs4
    source_media_opts: "ro,soft,timeo=5,retrans=1,_netdev,nofail"

    # Optional centralized journald upload
    enable_journal_upload: false
    journal_aggregator_url: "http://swarm1:19532"

  tasks:
    # --- Packages & user (match workers) ---
    - name: Ensure packages
      ansible.builtin.package:
        name: "{{ base_packages }}"
        state: present

    - name: Ensure thinman group
      ansible.builtin.group:
        name: "{{ thinman_group }}"
        state: present

    # Keep parity with workers (render group exists there)
    - name: Ensure render group
      ansible.builtin.group:
        name: render
        state: present

    - name: Ensure thinman user (in video+render groups)
      ansible.builtin.user:
        name: "{{ thinman_user }}"
        groups: "{{ thinman_group }},video,render"
        append: yes
        shell: /bin/bash
        create_home: yes

    - name: Allow manager to control only the watcher service
      ansible.builtin.copy:
        dest: /etc/sudoers.d/thinvids-manager-watcher-control
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
        content: |
          {{ thinman_user }} ALL=(root) NOPASSWD: /bin/systemctl start thinvids_watcher.service, /bin/systemctl stop thinvids_watcher.service, /bin/systemctl restart thinvids_watcher.service, /usr/bin/systemctl start thinvids_watcher.service, /usr/bin/systemctl stop thinvids_watcher.service, /usr/bin/systemctl restart thinvids_watcher.service

    # --- Directories (mountpoints + app dir) ---
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_root }}/current"
        state: directory
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0755"

    - name: Ensure NFS mountpoints exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ watch_dir }}"
        - "{{ library_dir }}"
        - "{{ config_dir }}"

    - name: Ensure /source_media mountpoint exists
      ansible.builtin.file:
        path: "{{ source_media_dir }}"
        state: directory

    # --- NFS mounts (idempotent) ---
    - name: Mount /watch (NFS)
      ansible.builtin.mount:
        path: "{{ watch_dir }}"
        src: "{{ nfs_server }}:{{ nfs_watch_export }}"
        fstype: "{{ nfs_fstype }}"
        opts: "{{ nfs_opts }}"
        state: mounted

    - name: Mount /library (NFS)
      ansible.builtin.mount:
        path: "{{ library_dir }}"
        src: "{{ nfs_server }}:{{ nfs_library_export }}"
        fstype: "{{ nfs_fstype }}"
        opts: "{{ nfs_opts }}"
        state: mounted

    - name: Ensure NFS project scratch root exists
      ansible.builtin.file:
        path: "{{ nfs_project_root }}"
        state: directory
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0775"

    - name: Mount /config (NFS)
      ansible.builtin.mount:
        path: "{{ config_dir }}"
        src: "{{ nfs_server }}:{{ nfs_config_export }}"
        fstype: "{{ nfs_fstype }}"
        opts: "{{ nfs_opts }}"
        state: mounted

    - name: Mount /source_media (swarm2 read-only NFS)
      ansible.builtin.mount:
        path: "{{ source_media_dir }}"
        src: "{{ source_media_server }}:{{ source_media_export }}"
        fstype: "{{ source_media_fstype }}"
        opts: "{{ source_media_opts }}"
        state: mounted

    - name: Ensure watcher env override file exists
      ansible.builtin.copy:
        dest: "{{ config_dir }}/watcher.env"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0644"
        force: false
        content: |
          # Optional thinvids watcher overrides.
          # The manager Watcher page updates this file and restarts thinvids_watcher.service.

    - name: Ensure watcher env override file ownership
      ansible.builtin.file:
        path: "{{ config_dir }}/watcher.env"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0644"

    # --- venv for manager ---
    - name: Create venv
      command: python3 -m venv {{ app_root }}/venv
      args:
        creates: "{{ app_root }}/venv/bin/python"

    - name: Upgrade pip
      command: "{{ app_root }}/venv/bin/pip install --upgrade pip"
      changed_when: false

    - name: Install Python deps in venv
      ansible.builtin.pip:
        name: "{{ pip_packages }}"
        virtualenv: "{{ app_root }}/venv"

    # --- Deploy only what workers need: worker/ + agent.py ---
    - name: Sync manager code
      ansible.builtin.copy:
        src: "{{ code_src }}/manager/"
        dest: "{{ app_root }}/current/"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: preserve
      notify:
        - restart thinvids_manager
        - restart thinvids_manager_housekeeping
      tags: build_app # Add a tag here

    - name: Install tasks.py from worker tree
      ansible.builtin.copy:
        src: "{{ code_src }}/worker/tasks.py"
        dest: "{{ app_root }}/current/tasks.py"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0644"
      notify:
        - restart thinvids_manager
        - restart thinvids_manager_housekeeping
      tags: build_app # Add a tag here

    - name: Install common.py
      ansible.builtin.copy:
        src: "{{ code_src }}/common.py"
        dest: "{{ app_root }}/current/common.py"
        owner: "{{ thinman_user }}"
        group: "{{ thinman_group }}"
        mode: "0644"
      notify: 
        - restart thinvids_manager 
        - restart thinvids_manager_housekeeping
        - restart thinvids_watcher
      tags: build_app # Add a tag here


    - name: Purge old bytecode (avoid stale imports)
      command: find {{ app_root }}/current -name __pycache__ -type d -prune -exec rm -rf {} +
      changed_when: false
      tags: build_app # Add a tag here

    # --- Make "redis" resolvable (app.py uses host='redis') ---
    - name: Resolve redis_host IP
      command: getent hosts {{ redis_host }}
      register: redis_getent
      changed_when: false
      failed_when: redis_getent.rc != 0

    - name: Set redis_ip fact
      ansible.builtin.set_fact:
        redis_ip: "{{ (redis_getent.stdout.split() | first) | default('') }}"

    - name: Add /etc/hosts alias for 'redis'
      ansible.builtin.lineinfile:
        path: /etc/hosts
        create: yes
        line: "{{ redis_ip }} redis"
        state: present
        insertafter: EOF
      when: redis_ip != ""

    # --- Service (requires NFS mounts before starting) ---
    - name: thinvids_manager.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/thinvids_manager.service
        mode: "0644"
        content: |
          [Unit]
          Description=Thinvids Manager (Flask via Gunicorn)
          After=network-online.target remote-fs.target
          Wants=network-online.target remote-fs.target
          RequiresMountsFor={{ watch_dir }} {{ library_dir }} {{ config_dir }} {{ source_media_dir }}

          [Service]
          Type=simple
          User={{ thinman_user }}
          Group={{ thinman_group }}
          WorkingDirectory={{ app_root }}/current
          Environment=PYTHONPATH={{ app_root }}/current
          Environment=REDIS_HOST={{ redis_host }}
          Environment=REDIS_PORT={{ redis_port }}
          Environment=REDIS_DB_TASKS={{ redis_db_tasks }}
          Environment=REDIS_DB_DATA={{ redis_db_data }}
          Environment=HUEY_NAME={{ huey_name }}
          Environment=CONFIG_ROOT={{ config_dir }}
          Environment=WATCH_ROOT={{ watch_dir }}
          Environment=SOURCE_MEDIA_ROOT={{ source_media_dir }}
          Environment=LIBRARY_ROOT={{ library_dir }}
          Environment=PROCESSED_FILE={{ config_dir }}/processed.log
          Environment=WATCHER_SERVICE=thinvids_watcher.service
          Environment=WATCHER_ENV_FILE={{ config_dir }}/watcher.env
          Environment=NFS_PROJECT_ROOT={{ nfs_project_root }}
          Environment=MASTER_HTTP_PORT={{ master_http_port }}
          Environment=PIPELINE_MAX_ACTIVE_JOBS={{ pipeline_max_active_jobs }}
          Environment=PIPELINE_DRAIN_RATIO_TO_START_NEXT={{ pipeline_drain_ratio_to_start_next }}
          Environment=PIPELINE_MIN_IDLE_WORKERS_TO_START_NEXT={{ pipeline_min_idle_workers_to_start_next }}
          ExecStart={{ app_root }}/venv/bin/gunicorn -w 2 -t 120 -b 0.0.0.0:{{ manager_http_port }} app:app
          Restart=always
          RestartSec=2
          SyslogIdentifier=thinvids_manager

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart thinvids_manager

    - name: thinvids_manager_housekeeping.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/thinvids_manager_housekeeping.service
        mode: "0644"
        content: |
          [Unit]
          Description=Thinvids Manager Housekeeping
          After=network-online.target remote-fs.target
          Wants=network-online.target remote-fs.target
          RequiresMountsFor={{ watch_dir }} {{ library_dir }} {{ config_dir }} {{ source_media_dir }}

          [Service]
          Type=simple
          User={{ thinman_user }}
          Group={{ thinman_group }}
          WorkingDirectory={{ app_root }}/current
          Environment=PYTHONPATH={{ app_root }}/current
          Environment=REDIS_HOST={{ redis_host }}
          Environment=REDIS_PORT={{ redis_port }}
          Environment=REDIS_DB_TASKS={{ redis_db_tasks }}
          Environment=REDIS_DB_DATA={{ redis_db_data }}
          Environment=HUEY_NAME={{ huey_name }}
          Environment=CONFIG_ROOT={{ config_dir }}
          Environment=WATCH_ROOT={{ watch_dir }}
          Environment=SOURCE_MEDIA_ROOT={{ source_media_dir }}
          Environment=LIBRARY_ROOT={{ library_dir }}
          Environment=PROCESSED_FILE={{ config_dir }}/processed.log
          Environment=WATCHER_SERVICE=thinvids_watcher.service
          Environment=WATCHER_ENV_FILE={{ config_dir }}/watcher.env
          Environment=NFS_PROJECT_ROOT={{ nfs_project_root }}
          Environment=MASTER_HTTP_PORT={{ master_http_port }}
          Environment=PIPELINE_MAX_ACTIVE_JOBS={{ pipeline_max_active_jobs }}
          Environment=PIPELINE_DRAIN_RATIO_TO_START_NEXT={{ pipeline_drain_ratio_to_start_next }}
          Environment=PIPELINE_MIN_IDLE_WORKERS_TO_START_NEXT={{ pipeline_min_idle_workers_to_start_next }}
          ExecStart={{ app_root }}/venv/bin/python housekeeping.py
          Restart=always
          RestartSec=2
          SyslogIdentifier=thinvids_manager_housekeeping

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart thinvids_manager_housekeeping

    - name: Reload systemd (ensure unit visible before first start)
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable & start thinvids_manager
      ansible.builtin.systemd:
        name: thinvids_manager
        enabled: true
        state: started

    - name: Enable & start thinvids_manager_housekeeping
      ansible.builtin.systemd:
        name: thinvids_manager_housekeeping
        enabled: true
        state: started

    # --- Centralized journald upload (optional, same as workers) ---
    - name: Install systemd-journal-upload
      when: enable_journal_upload | bool
      ansible.builtin.package:
        name: systemd-journal-upload
        state: present

    - name: Configure journal-upload
      when: enable_journal_upload | bool
      ansible.builtin.copy:
        dest: /etc/systemd/journal-upload.conf
        mode: "0644"
        content: |
          [Upload]
          URL={{ journal_aggregator_url }}
          ServerKeyFile=
          ServerCertificateFile=
          TrustedCertificateFile=

    - name: Enable & start journal-upload
      when: enable_journal_upload | bool
      ansible.builtin.systemd:
        name: systemd-journal-upload
        enabled: true
        state: started

    # --- Watcher systemd unit ---
    - name: thinvids_watcher.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/thinvids_watcher.service
        mode: "0644"
        content: |
          [Unit]
          Description=Thinvids Watcher (submit new files to manager)
          After=network-online.target remote-fs.target thinvids_manager.service
          Wants=network-online.target remote-fs.target thinvids_manager.service
          RequiresMountsFor={{ watch_dir }} {{ config_dir }}

          [Service]
          Type=simple
          User={{ thinman_user }}
          Group={{ thinman_group }}
          WorkingDirectory={{ app_root }}/current
          Environment=WATCH_ROOT={{ watch_dir }}
          Environment=CONFIG_ROOT={{ config_dir }}
          Environment=PROCESSED_FILE={{ config_dir }}/processed.log
          Environment=ADOPT_EXISTING_PROCESSED_ON_STARTUP=1
          Environment=ADOPT_EXISTING_PROCESSED_MARKER={{ config_dir }}/processed.log.watch.adopted
          Environment=PROCESSED_PATH_ALIASES=tv=television
          Environment=MANAGER_HTTP_PORT={{ manager_http_port }}
          EnvironmentFile=-{{ config_dir }}/watcher.env
          # Optional tunables:
          # Environment=STABLE_CHECKS=5
          # Environment=STABLE_DELAY_SEC=10
          ExecStart={{ app_root }}/venv/bin/python watcher.py
          Restart=always
          RestartSec=3
          SyslogIdentifier=thinvids_watcher

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart thinvids_watcher

    - name: Reload systemd (ensure units visible)
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable & start thinvids_watcher
      ansible.builtin.systemd:
        name: thinvids_watcher
        enabled: true
        state: started

  handlers:
    - name: systemd daemon-reload
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: restart thinvids_manager
      ansible.builtin.systemd:
        name: thinvids_manager
        state: restarted

    - name: restart thinvids_manager_housekeeping
      ansible.builtin.systemd:
        name: thinvids_manager_housekeeping
        state: restarted

    - name: restart thinvids_watcher
      ansible.builtin.systemd:
        name: thinvids_watcher
        state: restarted
